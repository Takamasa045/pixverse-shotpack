# Starter storyboard for a new project.
# このファイルは Director の出力契約をそのまま表す最小テンプレート。

meta:
  title: "generic-launch-film"
  fps: 30
  aspects: ["16:9"]
  style_notes: "[overall tone, texture, pacing, atmosphere]"
  color_arc: "cool-to-warm"
  prompt_negative: "blurry, distorted faces, watermark"
  workflow: "t2v"

# workflow が i2v の場合のみ有効
# image_generation:
#   model: "seedream-5.0-lite"
#   quality: "1800p"
#   aspect_ratio: "16:9"

shots:
  - id: "shot-01"
    prompt: >-
      Quiet opening wide shot of [location or environment],
      restrained light, clean negative space,
      cinematic atmosphere with tactile detail
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: false
    multi_shot: false
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Establish world and visual tone."

  - id: "shot-02"
    prompt: >-
      Close detail study of [material or object],
      soft directional light and shallow depth,
      delicate movement in a quiet frame
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: false
    multi_shot: false
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Move from atmosphere into tactile detail."

  - id: "shot-03"
    prompt: >-
      Hero reveal of [main subject],
      composed center frame, subtle motion,
      premium editorial feeling with controlled highlights
    model: "v6"
    quality: "1080p"
    duration: 5
    aspect_ratio: "16:9"
    audio: true
    multi_shot: true
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "First clear presentation of the hero subject."

  - id: "shot-04"
    prompt: >-
      Human interaction with [main subject],
      measured gesture, layered foreground and background,
      calm motion with space around the action
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: true
    multi_shot: false
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Show function or presence without crowding the frame."

  - id: "shot-05"
    prompt: >-
      Mid-sequence momentum shot with the subject in use,
      refined camera energy, atmospheric background,
      visual confidence without excessive spectacle
    model: "v6"
    quality: "1080p"
    duration: 5
    aspect_ratio: "16:9"
    audio: true
    multi_shot: true
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Build toward the final hold."

  - id: "shot-06"
    prompt: >-
      Closing frame with warm settling light and generous negative space,
      the subject resting in a memorable final composition,
      calm premium ending with afterglow
    model: "v6"
    quality: "1080p"
    duration: 8
    aspect_ratio: "16:9"
    audio: true
    multi_shot: false
    image_ref: null
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Longer ending hold with wabi-sabi restraint."
