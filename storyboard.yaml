meta:
  title: "signature-product-launch"
  fps: 30
  aspects: ["16:9", "9:16"]
  style_notes: "premium editorial, warm neutrals, soft charcoal contrast, tactile materials, shallow depth of field, subtle film grain"
  color_arc: "cool-to-warm"
  prompt_negative: "blurry, distorted faces, watermark, oversaturated, warped hands"
  workflow: "i2v"

image_generation:
  model: "seedream-5.0-lite"
  quality: "1800p"
  aspect_ratio: "16:9"

shots:
  - id: "shot-01"
    prompt: >-
      Quiet studio interior at first light,
      hero product resting on a central plinth,
      calm architectural atmosphere with generous negative space
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: false
    multi_shot: false
    image_ref: "generate"
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Opening wide shot. Let the still carry the composition and let motion stay restrained."

  - id: "shot-02"
    prompt: >-
      Brushed metal and textured fabric seen in a tactile close detail,
      grazing light revealing fine surface variations,
      intimate premium material study
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: false
    multi_shot: false
    image_ref: "generate"
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Detail shot. Keep movement minimal and elegant."

  - id: "shot-03"
    prompt: >-
      Hero product isolated in a refined editorial composition,
      controlled practical lighting and soft atmosphere,
      premium reveal with clear silhouette
    model: "v6"
    quality: "1080p"
    duration: 5
    aspect_ratio: "16:9"
    audio: true
    multi_shot: true
    image_ref: "generate"
    post_process:
      extend: null
      upscale: "4k"
      sound: null
      speech: null
    notes: "Primary hero shot. Candidate for upscale after approval."

  - id: "shot-04"
    prompt: >-
      Hands carefully placing and adjusting the product inside the studio,
      layered foreground shapes and measured motion,
      tactile interaction without showing readable text
    model: "v6"
    quality: "1080p"
    duration: 4
    aspect_ratio: "16:9"
    audio: true
    multi_shot: false
    image_ref: "generate"
    post_process:
      extend: null
      upscale: null
      sound: "soft fabric touch and subtle room tone"
      speech: null
    notes: "Human interaction shot. Hands must stay believable."

  - id: "shot-05"
    prompt: >-
      Product in use within a calm interior setting,
      subtle reflections and atmospheric depth,
      poised momentum before the final reveal
    model: "v6"
    quality: "1080p"
    duration: 5
    aspect_ratio: "16:9"
    audio: true
    multi_shot: true
    image_ref: "generate"
    post_process:
      extend: null
      upscale: null
      sound: null
      speech: null
    notes: "Use a longer shot to establish confidence and continuity."

  - id: "shot-06"
    prompt: >-
      Final frame of the product and surrounding space,
      warmer tones settling into the scene,
      calm premium ending image with lingering afterglow
    model: "v6"
    quality: "1080p"
    duration: 8
    aspect_ratio: "16:9"
    audio: true
    multi_shot: false
    image_ref: "generate"
    post_process:
      extend: 2
      upscale: null
      sound: "soft air movement and distant architectural resonance"
      speech: null
    notes: "Closing hold. Lean into restraint and generous negative space."
