# Starter storyboard for a new project.
# 編集してそのまま使える汎用サンプル。具体例は examples/ 配下を参照。

meta:
  title: "generic-launch-film"
  fps: 30
  aspects: ["16:9"]
  style_notes: "[overall look, finish, palette, texture, lens feel]"
  color_arc: cool-to-warm
  prompt_negative: "blurry, distorted faces, jerky motion, morphing, flickering, text, watermark, oversaturated"

# Composition Summary:
#   Total: ~25s / 6 shots
#   Act 1 (Hook):       shot-01 + shot-02 = 5s  (20%)
#   Act 2 (Body):       shot-03〜shot-05  = 12s (48%)
#   Act 3 (Resolution): shot-06           = 8s  (32%)
#   Duration variance:  2s : 8s = 1:4 ✓
#   Camera variety: 6 distinct movements ✓

shots:
  # === Act 1: Hook ===

  - id: shot-01
    type: video
    prompt: >-
      Wide establishing shot of [environment or location],
      [time of day] light, [weather or atmosphere],
      premium cinematic opening mood
    duration: 3
    model: v5.6
    quality: 1080p
    hero: true
    act: 1
    framing: wide
    color_temp: cool
    transition: crossfade
    camera:
      movement: aerial-drift
    objective: "Establish world"
    emotion: "curiosity"
    motif: "environment"

  - id: shot-02
    type: video
    prompt: >-
      Extreme close-up of [surface, material, or signature detail],
      shallow depth of field, soft directional light,
      tactile visual hook
    duration: 2
    act: 1
    framing: extreme-close-up
    color_temp: cool
    transition: cut
    camera:
      movement: static
    objective: "Introduce texture"
    emotion: "intimacy"
    motif: "detail"

  # === Act 2: Body ===

  - id: shot-03
    type: video
    prompt: >-
      Close-up of [hero object, product, or prop] in its natural setting,
      practical lighting, subtle atmospheric motion,
      focused premium composition
    duration: 4
    act: 2
    framing: close-up
    color_temp: neutral
    transition: cut
    camera:
      movement: dolly-in
    objective: "Present core motif"
    emotion: "attention"
    motif: "hero-object"

  - id: shot-04
    type: video
    prompt: >-
      Hands or silhouette interacting with [hero object or interface],
      layered foreground and background elements,
      purposeful action in progress
    duration: 3
    act: 2
    framing: medium-close
    color_temp: neutral
    transition: cut
    camera:
      movement: pan-right
    objective: "Show interaction"
    emotion: "focus"
    motif: "interaction"

  - id: shot-05
    type: video
    prompt: >-
      Medium shot of [hero scene or process moment],
      controlled light contrast, atmospheric depth,
      momentum building toward the main payoff
    duration: 5
    act: 2
    framing: medium
    color_temp: neutral
    transition: cut
    camera:
      movement: tracking
    objective: "Build momentum"
    emotion: "confidence"
    motif: "process"

  # === Act 3: Resolution ===

  - id: shot-06
    type: video
    prompt: >-
      Wide or medium-wide resolving shot of [final environment or hero frame],
      richer warm tones, lingering atmosphere,
      calm memorable ending image
    duration: 8
    act: 3
    framing: wide
    color_temp: warm
    transition: cut
    camera:
      movement: dolly-out
    objective: "Closing hold"
    emotion: "resolution"
    motif: "signature-frame"
